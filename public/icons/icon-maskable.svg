  <!-- Motif kept within the ~80% safe zone. -->
  <g fill="none" stroke="#e8b923" stroke-width="8">
    <circle cx="256" cy="256" r="132"/>
    <circle cx="256" cy="256" r="48"/>
  </g>
  <g stroke="#e8b923" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="124" x2="256" y2="176"/>
    <line x1="256" y1="336" x2="256" y2="388"/>
    <line x1="124" y1="256" x2="176" y2="256"/>
    <line x1="336" y1="256" x2="388" y2="256"/>
    <line x1="163" y1="163" x2="200" y2="200"/>
    <line x1="312" y1="312" x2="349" y2="349"/>
    <line x1="349" y1="163" x2="312" y2="200"/>
    <line x1="200" y1="312" x2="163" y2="349"/>
  </g>
  <circle cx="256" cy="256" r="15" fill="#e8b923"/>
</svg>
